<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Lens — AI Powered Stock Analysis Platform</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <!-- App styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="auth-shell">

    <!-- Signature ticker-tape strip -->
    <div class="ticker-wrap" id="tickerTape" aria-hidden="true"></div>

    <main class="auth-hero">
      <div class="auth-card">
        <div class="brand-mark font-display">SL</div>
        <h1 class="brand-title">Stock Lens</h1>
        <p class="brand-tagline">AI Powered Stock Analysis Platform</p>

        <div class="auth-actions">
          <a href="login.html" class="btn-primary-lens">Sign In</a>
          <a href="register.html" class="btn-outline-lens">Sign Up</a>
        </div>

        <p class="auth-footnote">Research-backed insights across financial health, growth, valuation and risk — in one place.</p>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/ticker.js"></script>
  <script src="js/auth.js"></script>
  <script>
    redirectIfLoggedIn();
    renderTicker("tickerTape");
  </script>
</body>
</html>
