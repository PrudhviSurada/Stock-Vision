<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Stock Lens</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="form-shell">
    <div class="form-card">
      <div class="form-brand">
        <div class="mark font-display">SL</div>
        <div class="name">Stock Lens</div>
      </div>

      <h2 class="form-title">Welcome back</h2>
      <p class="form-subtitle">Sign in to continue to your dashboard.</p>

      <div class="alert-lens" id="formAlert" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label for="email" class="lens-label">Email</label>
          <input type="email" class="lens-input" id="email" placeholder="you@example.com" autocomplete="email" required>
          <div class="field-error" id="emailError">Please enter a valid email address.</div>
        </div>

        <div class="mb-3">
          <label for="password" class="lens-label">Password</label>
          <input type="password" class="lens-input" id="password" placeholder="Enter your password" autocomplete="current-password" required>
          <div class="field-error" id="passwordError">Please enter your password.</div>
        </div>

        <button type="submit" class="btn-submit">Login</button>
      </form>

      <p class="form-switch-caption">Don't have an account? <a href="register.html">Sign Up</a></p>
      <p class="form-switch-caption"><a href="index.html"><i class="bi bi-arrow-left"></i> Back to home</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    redirectIfLoggedIn();

    const form = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");
    const formAlert = document.getElementById("formAlert");

    function showAlert(message, type) {
      formAlert.textContent = message;
      formAlert.className = `alert-lens ${type} show`;
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      formAlert.classList.remove("show");
      emailError.classList.remove("show");
      passwordError.classList.remove("show");
      emailInput.classList.remove("is-invalid");
      passwordInput.classList.remove("is-invalid");

      let hasError = false;
      if (!isValidEmail(emailInput.value)) {
        emailError.classList.add("show");
        emailInput.classList.add("is-invalid");
        hasError = true;
      }
      if (!passwordInput.value) {
        passwordError.classList.add("show");
        passwordInput.classList.add("is-invalid");
        hasError = true;
      }
      if (hasError) return;

      const result = loginUser({ email: emailInput.value, password: passwordInput.value });

      if (result.ok) {
        showAlert(result.message, "success");
        setTimeout(() => (window.location.href = "dashboard.html"), 700);
      } else {
        showAlert(result.message, "error");
        emailInput.classList.add("is-invalid");
        passwordInput.classList.add("is-invalid");
      }
    });
  </script>
</body>
</html>
